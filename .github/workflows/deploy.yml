name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install genanki

      - run: npm ci
      - run: npm run build
      - run: cp -r audio dist/audio
      - run: python build-anki.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

      # Notify Bing/Yandex/etc. of the current URL set (Google ignores IndexNow).
      # Runs after deploy so the key file at /<key>.txt is already live for
      # verification. Non-fatal: a ping failure must never block the deploy.
      - name: Ping IndexNow
        continue-on-error: true
        run: node indexnow.mjs
